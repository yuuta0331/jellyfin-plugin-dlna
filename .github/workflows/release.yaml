name: '📦 Release Plugin'

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write
  pages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read plugin metadata
        id: meta
        run: |-
          VERSION=$(grep '^version:' build.yaml | awk '{print $2}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes from build.yaml
        if: github.event_name == 'workflow_dispatch'
        run: |-
          {
            echo "## What's New"
            echo
            yq -r '.changelog' build.yaml
            echo
            echo "## Install"
            echo
            echo "Add this plugin repository in Jellyfin Dashboard → Plugins → Repositories:"
            echo
            echo "https://yuuta0331.github.io/jellyfin-plugin-dlna/manifest.json"
          } > release-body.md

      - name: Upload release notes
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-body
          path: release-body.md
          if-no-files-found: error

  build:
    needs:
      - prepare
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/build.yaml@master
    with:
      dotnet-version: "9.0.x"
      dotnet-target: "net9.0"

  publish:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifact

      - name: Download release notes
        if: github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-body

      - name: Prepare release assets
        run: |-
          for file in ./*.zip; do
            base="${file#./}"
            md5sum "$base" >> "${base%.zip}.md5"
            sha256sum "$base" >> "${base%.zip}.sha256"
          done
          ls -la

      - name: Publish GitHub Release with assets
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Version ${{ needs.prepare.outputs.version }}
          body_path: release-body.md
          files: |
            ./*.zip
            ./*.md5
            ./*.sha256
          draft: false
          prerelease: false
          make_latest: true

      - name: Upload assets to existing GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: |
            ./*.zip
            ./*.md5
            ./*.sha256
          draft: false
          prerelease: false

  generate-manifest:
    runs-on: ubuntu-latest
    needs:
      - publish
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize gh-pages branch
        run: |-
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code origin refs/heads/gh-pages >/dev/null 2>&1; then
            echo "gh-pages branch already exists"
            exit 0
          fi

          git checkout --orphan gh-pages
          printf '%s\n' '[]' > manifest.json
          git add manifest.json
          git commit -m "Initialize gh-pages branch"
          git push origin gh-pages

      - name: Jellyfin plugin repo
        uses: Kevinjil/jellyfin-plugin-repo-action@296850372cd569cbcc040e834222a5afed861485 # v0.4.3
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          pagesBranch: gh-pages
          pagesFile: manifest.json
